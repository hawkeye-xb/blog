baseURL = "/"
languageCode = "zh-cn"
title = "Hawkeye-xb Blog"
theme = "terminal-hub"

defaultContentLanguage = "zh"
defaultContentLanguageInSubdir = true

[languages.zh]
  contentDir = "content/zh"
  languageName = "简体中文"
  weight = 1

[languages.en]
  contentDir = "content/en"
  languageName = "English"
  weight = 2

[markup.goldmark.renderer]
unsafe = true

[params]
author = "hawkeye-xb"
bio = "Full-stack Developer · Indie Maker"
avatar = "images/avatar.png"
colorScheme = "green"

[params.social]
github = "https://github.com/hawkeye-xb"
email = "hello@example.com"

[pagination]
pagerSize = 20

[taxonomies]
  category = "categories"
  tag = "tags"
  series = "series"
